<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CameraSimple - WebRTC Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #video {
            width: 100%;
            max-height: 70vh;
            display: block;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background: #374151;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-connected .status-indicator {
            background: #22c55e;
        }

        .status-disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-disconnected .status-indicator {
            background: #ef4444;
            animation: none;
        }

        .status-connecting {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        .status-connecting .status-indicator {
            background: #eab308;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .config-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-section h3 {
            margin-bottom: 15px;
            font-size: 1rem;
            color: #94a3b8;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group label {
            color: #94a3b8;
            font-size: 0.85rem;
            min-width: 80px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.9rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        footer {
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 CameraSimple WebRTC Viewer</h1>
            <p class="subtitle">Low-latency GPU-accelerated streaming</p>
        </header>

        <div class="config-section">
            <h3>⚙️ Stream Configuration</h3>
            <div class="input-group">
                <label>Server:</label>
                <input type="text" id="serverUrl" value="localhost:8889" placeholder="host:port">
                <label>Path:</label>
                <input type="text" id="streamPath" value="camera" placeholder="stream path">
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="connect()">
                ▶️ Connect
            </button>
            <button class="btn btn-danger" onclick="disconnect()">
                ⏹️ Disconnect
            </button>
            <button class="btn btn-secondary" onclick="toggleFullscreen()">
                ⛶ Fullscreen
            </button>
        </div>

        <div style="text-align: center; margin-bottom: 15px;">
            <span id="statusBadge" class="status status-disconnected">
                <span class="status-indicator"></span>
                <span id="statusText">Disconnected</span>
            </span>
        </div>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Latency</div>
                <div class="stat-value" id="latency">-- ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Resolution</div>
                <div class="stat-value" id="resolution">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Framerate</div>
                <div class="stat-value" id="framerate">-- fps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Bitrate</div>
                <div class="stat-value" id="bitrate">-- kbps</div>
            </div>
        </div>

        <footer>
            <p>CameraSimple Component - RoboComp / RoboLab</p>
            <p>Streaming via MediaMTX with GPU encoding (NVENC/nvv4l2h264enc)</p>
        </footer>
    </div>

    <script>
        let pc = null;
        let statsInterval = null;
        let lastBytes = 0;
        let lastTime = Date.now();
        let frameCount = 0;
        let lastFrameTime = Date.now();

        function getStreamUrl() {
            const server = document.getElementById('serverUrl').value;
            const path = document.getElementById('streamPath').value;
            return `http://${server}/${path}/whep`;
        }

        function setStatus(status, text) {
            const badge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            badge.className = `status status-${status}`;
            statusText.textContent = text;
        }

        async function connect() {
            if (pc) {
                disconnect();
            }

            setStatus('connecting', 'Connecting...');

            try {
                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.addTransceiver('video', { direction: 'recvonly' });
                pc.addTransceiver('audio', { direction: 'recvonly' });

                pc.ontrack = (event) => {
                    console.log('Track received:', event.track.kind);
                    if (event.track.kind === 'video') {
                        document.getElementById('video').srcObject = event.streams[0];
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    console.log('ICE state:', pc.iceConnectionState);
                    if (pc.iceConnectionState === 'connected') {
                        setStatus('connected', 'Connected');
                        startStats();
                    } else if (pc.iceConnectionState === 'disconnected' ||
                               pc.iceConnectionState === 'failed') {
                        setStatus('disconnected', 'Disconnected');
                        stopStats();
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering
                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') {
                                resolve();
                            }
                        };
                    }
                });

                const response = await fetch(getStreamUrl(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: pc.localDescription.sdp
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const answer = await response.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answer });

            } catch (error) {
                console.error('Connection error:', error);
                setStatus('disconnected', 'Error: ' + error.message);
                disconnect();
            }
        }

        function disconnect() {
            stopStats();
            if (pc) {
                pc.close();
                pc = null;
            }
            document.getElementById('video').srcObject = null;
            setStatus('disconnected', 'Disconnected');

            // Reset stats
            document.getElementById('latency').textContent = '-- ms';
            document.getElementById('resolution').textContent = '--';
            document.getElementById('framerate').textContent = '-- fps';
            document.getElementById('bitrate').textContent = '-- kbps';
        }

        function startStats() {
            statsInterval = setInterval(updateStats, 1000);
        }

        function stopStats() {
            if (statsInterval) {
                clearInterval(statsInterval);
                statsInterval = null;
            }
        }

        async function updateStats() {
            if (!pc) return;

            try {
                const stats = await pc.getStats();
                const now = Date.now();

                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && report.kind === 'video') {
                        // Bitrate
                        const bytes = report.bytesReceived;
                        const timeDiff = (now - lastTime) / 1000;
                        const bitrate = ((bytes - lastBytes) * 8 / timeDiff / 1000).toFixed(0);
                        document.getElementById('bitrate').textContent = `${bitrate} kbps`;
                        lastBytes = bytes;
                        lastTime = now;

                        // Framerate
                        if (report.framesReceived) {
                            const frames = report.framesReceived;
                            const fps = ((frames - frameCount) / timeDiff).toFixed(1);
                            document.getElementById('framerate').textContent = `${fps} fps`;
                            frameCount = frames;
                        }

                        // Jitter/Latency estimate
                        if (report.jitter) {
                            const latency = (report.jitter * 1000).toFixed(0);
                            document.getElementById('latency').textContent = `~${latency} ms`;
                        }
                    }

                    if (report.type === 'track' && report.kind === 'video') {
                        if (report.frameWidth && report.frameHeight) {
                            document.getElementById('resolution').textContent =
                                `${report.frameWidth}x${report.frameHeight}`;
                        }
                    }
                });

                // Get resolution from video element if not available from stats
                const video = document.getElementById('video');
                if (video.videoWidth && video.videoHeight) {
                    document.getElementById('resolution').textContent =
                        `${video.videoWidth}x${video.videoHeight}`;
                }

            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        function toggleFullscreen() {
            const video = document.getElementById('video');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                video.requestFullscreen();
            }
        }

        // Auto-detect server from URL
        window.onload = () => {
            const hostname = window.location.hostname || 'localhost';
            if (hostname !== 'localhost' && hostname !== '127.0.0.1') {
                document.getElementById('serverUrl').value = `${hostname}:8889`;
            }
        };
    </script>
</body>
</html>
