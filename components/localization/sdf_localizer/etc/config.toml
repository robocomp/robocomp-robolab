[Proxies]
# This property is used by the clients to connect to IceStorm.
TopicManager = "IceStorm/TopicManager:default -p 9999"
# Proxies for required interfaces
Lidar3D = "lidar3d:tcp -h localhost -p 11995" # FILTER"
Webots2Robocomp = "webots2robocomp:tcp -h localhost -p 10006"
OmniRobot = "omnirobot:tcp -h localhost -p 10004"

[Endpoints]
# Endpoints for subscriptions interfaces
FullPoseEstimationPubTopic = "tcp -p 0"
FullPoseEstimationPubPrefix = ""
JoystickAdapterTopic = "tcp -p 0"
JoystickAdapterPrefix = ""

[Period]
Compute = 100
Emergency = 500

[RoomConcept]
PredictionEarlyExit = true    # Skip RFE optimization when predicted pose SDF error is already low
NumIterations  = 10           # Adam steps per update (25 = accurate, 5 = fast)
WindowSize     = 50           # Past lidar slots optimized jointly (10 = accurate, 3 = fast)
MaxLidarPoints = 300          # Max points in newest slot (1000 = accurate, 300 = fast)
MaxLidarOldSlot = 200         # Max points in older slots (300 = accurate, 100 = fast)
RecoveryLossThreshold = 0.3   # avg SDF error (sqrt(sdf_mse)) above this = bad localization (meters)
RecoveryConsecutiveCount = 3  # Bad frames in a row before triggering grid search recovery
OdomNoiseScale = 1.0          # Multiplier on odometry noise (>1 simulates worse odometry, e.g. 5.0)
DifferentialTest = false     # Enable shadow single-step evaluator for RFE vs baseline A/B comparison

[Component.Debug]
Verbose = true

[Ice]
Warn.Connections = "0"
Trace.Network = "0"
Trace.Protocol = "0"
MessageSizeMax = "20004800"
